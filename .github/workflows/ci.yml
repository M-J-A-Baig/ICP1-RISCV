name: sv_CI

on:
  push:
  pull_request:

jobs:
  sv-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # ---------------------------
      # Install tools
      # ---------------------------
      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y verilator iverilog

      # ---------------------------
      # Lint with Verilator
      # ---------------------------
#      - name: Lint SystemVerilog
#        run: |
#          verilator --lint-only -Wall src/design/common.sv src/design/alu.sv src/design/*.sv 

      # ---------------------------
      # Compile with Icarus Verilog
      # ---------------------------
      - name: Compile testbench
        run: |
          verilator --binary -sv \
          -I src/design \
          --top-module testbench \
          $(find src/design -name "*.sv") \
          src/simulation/testbench.sv \
          -o obj_dir/simulate

 #                  iverilog -g2012 -I src/design -s cpu -o sim.out src/design/*.sv src/simulation/testbench.sv


      # ---------------------------
      # Run simulation
      # ---------------------------
      - name: Run simulation
        run: |
          vvp sim.out
